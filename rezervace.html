<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Příprava na SkaRe – Flotila Liberec</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#0a1628;--blue:#1a56a0;--blue2:#2471c8;--red:#c0392b;
    --gold:#f0a500;--white:#f5f7fa;--gray:#8899aa;--light:#dde6f0;
    --correct:#27ae60;--wrong:#c0392b;--radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Barlow',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;
    background-image:radial-gradient(ellipse at 20% 0%,rgba(26,86,160,.18) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 100%,rgba(192,57,43,.12) 0%,transparent 60%);}
  .waves-top{position:fixed;top:0;left:0;right:0;height:4px;
    background:linear-gradient(90deg,var(--blue),var(--red),var(--blue2),var(--gold));z-index:100;}
  header{text-align:center;padding:3rem 2rem 2rem;}
  .header-badge{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:11px;
    font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);
    border:1px solid rgba(240,165,0,.4);padding:4px 14px;border-radius:20px;margin-bottom:1rem;}
  header h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(2.2rem,6vw,3.8rem);
    font-weight:900;letter-spacing:1px;line-height:1.1;text-transform:uppercase;}
  header h1 span{color:var(--blue2);}
  header p{margin-top:.6rem;font-size:1rem;color:var(--gray);font-weight:500;}
  .progress-bar-wrap{max-width:700px;margin:0 auto 2.5rem;padding:0 1.5rem;}
  .progress-info{display:flex;justify-content:space-between;font-size:13px;color:var(--gray);
    margin-bottom:6px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;}
  .progress-track{height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--blue2),var(--gold));
    border-radius:3px;transition:width .5s ease;width:0%;}
  .quiz-wrap{max-width:700px;margin:0 auto;padding:0 1.5rem 4rem;}
  .question-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);
    border-radius:16px;padding:2rem;margin-bottom:1.5rem;animation:fadeUp .4s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .q-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
    letter-spacing:3px;text-transform:uppercase;color:var(--blue2);margin-bottom:.8rem;}
  .q-text{font-size:1.1rem;font-weight:600;line-height:1.5;margin-bottom:1.2rem;}
  .q-note{font-size:.85rem;color:var(--gray);margin-bottom:1rem;font-style:italic;}
  .q-img{width:100%;max-height:280px;object-fit:contain;border-radius:var(--radius);
    margin-bottom:1.2rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);padding:8px;}
  .options{display:flex;flex-direction:column;gap:10px;}
  .option-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
    border-radius:var(--radius);padding:13px 16px;text-align:left;cursor:pointer;
    color:var(--white);font-size:.95rem;font-family:'Barlow',sans-serif;font-weight:500;
    transition:background .18s,border-color .18s,transform .1s;display:flex;align-items:center;gap:12px;}
  .option-btn:hover:not(:disabled){background:rgba(36,113,200,.2);border-color:var(--blue2);transform:translateX(3px);}
  .opt-letter{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;
    font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;flex-shrink:0;}
  .option-btn.correct{background:rgba(39,174,96,.18);border-color:var(--correct);pointer-events:none;}
  .option-btn.correct .opt-letter{background:var(--correct);border-color:var(--correct);}
  .option-btn.wrong{background:rgba(192,57,43,.18);border-color:var(--wrong);pointer-events:none;}
  .option-btn.wrong .opt-letter{background:var(--wrong);border-color:var(--wrong);}
  .option-btn:disabled{cursor:default;}
  .feedback-box{margin-top:1.2rem;padding:1rem 1.2rem;border-radius:var(--radius);
    font-size:.95rem;line-height:1.5;display:none;animation:fadeUp .3s ease;}
  .feedback-box.show{display:block;}
  .feedback-box.correct-fb{background:rgba(39,174,96,.12);border:1px solid rgba(39,174,96,.4);color:#7dcea0;}
  .feedback-box.wrong-fb{background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.4);color:#f1948a;}
  .feedback-box strong{display:block;margin-bottom:4px;font-size:1rem;}
  .next-btn{margin-top:1.2rem;display:none;background:var(--blue2);color:#fff;border:none;
    border-radius:var(--radius);padding:12px 28px;font-family:'Barlow Condensed',sans-serif;
    font-size:1rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;
    transition:background .18s,transform .1s;}
  .next-btn:hover{background:var(--blue);transform:translateY(-1px);}
  .next-btn.show{display:inline-block;}
  .retry-notice{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;
    text-transform:uppercase;color:var(--gold);margin-bottom:.8rem;
    padding:6px 12px;background:rgba(240,165,0,.08);border-radius:6px;display:inline-block;}
  .section-divider{display:flex;align-items:center;gap:1rem;margin:2.5rem 0 1.5rem;}
  .section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1);}
  .section-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
    letter-spacing:3px;text-transform:uppercase;color:var(--gold);white-space:nowrap;}
  /* DRAG ORDER */
  .drag-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1.2rem;}
  .drag-item{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
    border-radius:var(--radius);padding:12px 16px;cursor:grab;display:flex;align-items:center;
    gap:12px;font-size:.92rem;font-weight:500;transition:background .15s,border-color .15s;user-select:none;}
  .drag-item:active{cursor:grabbing;}
  .drag-item.dragging{opacity:.4;background:rgba(36,113,200,.2);border-color:var(--blue2);}
  .drag-item.drag-over{border-color:var(--gold);background:rgba(240,165,0,.1);}
  .drag-handle{color:var(--gray);font-size:16px;flex-shrink:0;}
  .drag-num{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.08);
    display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;
    font-weight:700;font-size:13px;flex-shrink:0;}
  .drag-item.correct-item{border-color:var(--correct);background:rgba(39,174,96,.12);}
  .drag-item.wrong-item{border-color:var(--wrong);background:rgba(192,57,43,.12);}
  .action-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);
    border-radius:var(--radius);padding:12px 24px;color:var(--white);font-family:'Barlow Condensed',sans-serif;
    font-weight:700;font-size:1rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:background .18s;}
  .action-btn:hover{background:rgba(255,255,255,.14);}
  .action-btn:disabled{opacity:.4;cursor:default;}
  /* FLAG MATCH */
  .flag-dnd-wrap{display:flex;gap:2rem;flex-wrap:wrap;margin-bottom:1.2rem;}
  .pool-col{min-width:140px;}
  .col-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;
    text-transform:uppercase;color:var(--gray);margin-bottom:8px;}
  .flags-pool{display:flex;flex-wrap:wrap;gap:12px;min-height:60px;padding:8px;
    border:1px dashed rgba(255,255,255,.1);border-radius:var(--radius);}
  .flag-chip{cursor:grab;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.18);
    border-radius:8px;padding:6px 8px;display:flex;align-items:center;justify-content:center;
    user-select:none;transition:opacity .2s;}
  .flag-chip:active{cursor:grabbing;opacity:.5;}
  .targets-col{flex:1;min-width:220px;}
  .target-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .target-label{font-size:.88rem;color:var(--gray);min-width:150px;font-weight:500;}
  .target-drop{width:60px;height:48px;border:1.5px dashed rgba(255,255,255,.2);border-radius:8px;
    display:flex;align-items:center;justify-content:center;transition:border-color .2s,background .2s;}
  .target-drop.drag-over-target{border-color:var(--gold);background:rgba(240,165,0,.08);}
  .target-drop.correct-drop{border-color:var(--correct);background:rgba(39,174,96,.12);}
  .target-drop.wrong-drop{border-color:var(--wrong);background:rgba(192,57,43,.12);}
  /* MAST */
  .mast-wrap{display:flex;gap:2rem;align-items:flex-start;flex-wrap:wrap;margin-bottom:1.2rem;}
  .mast-controls{flex:1;min-width:200px;}
  .flag-row-ctrl{margin-bottom:14px;}
  .flag-row-label{font-size:.9rem;color:var(--light);font-weight:600;margin-bottom:6px;}
  .flag-btns{display:flex;align-items:center;gap:8px;}
  .mast-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);
    border-radius:6px;padding:6px 12px;color:var(--white);font-family:'Barlow Condensed',sans-serif;
    font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:background .15s;}
  .mast-btn:hover{background:rgba(255,255,255,.13);}
  .flag-pos-badge{font-size:12px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;
    padding:3px 8px;border-radius:4px;background:rgba(255,255,255,.07);color:var(--gray);}
  .flag-pos-badge.up{background:rgba(36,113,200,.2);color:var(--blue2);}
  /* RESULTS */
  .results-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
    border-radius:20px;padding:3rem 2rem;text-align:center;display:none;animation:fadeUp .5s ease;}
  .results-card.show{display:block;}
  .results-score{font-family:'Barlow Condensed',sans-serif;font-size:5rem;font-weight:900;
    line-height:1;color:var(--gold);margin-bottom:.5rem;}
  .results-label{font-size:1.1rem;color:var(--gray);margin-bottom:2rem;}
  .results-detail{font-size:1rem;color:var(--light);line-height:1.7;}
  .restart-btn{margin-top:2rem;background:var(--blue2);color:white;border:none;
    border-radius:var(--radius);padding:14px 32px;font-family:'Barlow Condensed',sans-serif;
    font-size:1.1rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;}
  .restart-btn:hover{background:var(--blue);}
  @media(max-width:500px){
    header{padding:2rem 1rem 1rem;}
    .question-card{padding:1.3rem;}
    .flag-dnd-wrap{flex-direction:column;}
    .mast-wrap{flex-direction:column;}
  }
</style>
</head>
<body>
<div class="waves-top"></div>
<header>
  <div class="header-badge">Flotila Liberec</div>
  <h1>Příprava na <span>SkaRe</span></h1>
  <p>Plachtění – pracovní list</p>
</header>
<div class="progress-bar-wrap" id="progress-wrap">
  <div class="progress-info">
    <span id="prog-label">0 / 20 správně</span>
    <span id="prog-pct">0 %</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
</div>
<div class="quiz-wrap" id="quiz-container"></div>
<div class="quiz-wrap">
  <div class="results-card" id="results-card">
    <div class="results-score" id="res-score">—</div>
    <div class="results-label">správných odpovědí</div>
    <div class="results-detail" id="res-detail"></div>
    <button class="restart-btn" onclick="restartQuiz()">Zkusit znovu</button>
  </div>
</div>

// ── Pennant flag SVGs (triangular/swallow-tail shape like real sailing pennants) ──
function pennantSVG(n, size=44) {
  // Pennant shape: wide on left, tapered to right (like image 1 shows)
  const h = Math.round(size * 0.65);
  const w = size;
  const defs = {
    1: `<polygon points="0,0 ${w},${h/2} 0,${h}" fill="white"/>
        <circle cx="${Math.round(w*0.35)}" cy="${h/2}" r="${Math.round(h*0.28)}" fill="#c0392b"/>`,

  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" style="display:block">${defs[n]||''}</svg>`;

const TOTAL = QUESTIONS.length;
let mainQueue = QUESTIONS.map((_,i)=>i);
let retryQueue = [];
let totalCorrect = 0;
let totalAnswered = 0;
const mastState = {};

// ── RENDER ─────────────────────────────────────────────────────────────────────
function renderQuestion(qIdx, retry) {
  const q = QUESTIONS[qIdx];
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';

  if (q.section) {
    const div = document.createElement('div');
    div.className = 'section-divider';
    div.innerHTML = `<span class="section-title">${q.section}</span>`;
    container.appendChild(div);
  }

  const card = document.createElement('div');
  card.className = 'question-card';

  let html = '';
  if (retry) html += `<div class="retry-notice">🔁 Opakování – zkus to znovu!</div>`;
  html += `<div class="q-label">Otázka ${totalAnswered + 1} z ${TOTAL}</div>`;
  html += `<div class="q-text">${q.text}</div>`;
  if (q.note) html += `<div class="q-note">${q.note}</div>`;
  if (q.img) html += `<img class="q-img" src="${IMGS[q.img]}" alt="Obrázek otázky">`;

  if (q.type === 'choice')    html += buildChoice(q);
  if (q.type === 'dragorder') html += buildDragOrder(q);
  if (q.type === 'flagmatch') html += buildFlagMatch(q);
  if (q.type === 'mast')      html += buildMast(q);

  html += `<div class="feedback-box" id="fb"></div>
           <button class="next-btn" id="next-btn" onclick="advance()">Další otázka →</button>`;

  card.innerHTML = html;
  container.appendChild(card);

  if (q.type === 'dragorder') initDragOrder();
  if (q.type === 'flagmatch') initFlagMatch(q);

  updateProgress();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── CHOICE ──────────────────────────────────────────────────────────────────────
function buildChoice(q) {
  const L = ['A','B','C','D','E'];
  return `<div class="options" id="opts">${q.options.map((o,i)=>
    `<button class="option-btn" onclick="checkChoice(${QUESTIONS.indexOf(q)},${i})">
      <span class="opt-letter">${L[i]}</span>${o}</button>`).join('')}</div>`;
}

function checkChoice(qIdx, chosen) {
  const q = QUESTIONS[qIdx];
  document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
  totalAnswered++;
  if (chosen === q.correct) {
    document.querySelectorAll('.option-btn')[chosen].classList.add('correct');
    feedback(true,'✓ Správně!',q.why);
    totalCorrect++;
  } else {
    document.querySelectorAll('.option-btn')[chosen].classList.add('wrong');
    document.querySelectorAll('.option-btn')[q.correct].classList.add('correct');
    feedback(false,'✗ Chyba!',`Správná odpověď: „${q.options[q.correct]}". ${q.why}`);
    retryQueue.push(qIdx);
  }
  updateProgress();
  showNext();
}

// ── DRAG ORDER ──────────────────────────────────────────────────────────────────
function buildDragOrder(q) {
  const shuffled = [...q.items].sort(()=>Math.random()-0.5);
  return `<div class="drag-list" id="drag-list">${shuffled.map((item,i)=>
    `<div class="drag-item" draggable="true" data-seq="${item.seq??'free'}">
      <span class="drag-handle">⠿</span>
      <span class="drag-num">${i+1}</span>
      <span>${item.text}</span>
    </div>`).join('')}</div>
  <button class="action-btn" id="check-order-btn" onclick="checkOrder(${QUESTIONS.indexOf(q)})">Zkontrolovat pořadí</button>`;
}

function initDragOrder() {
  const list = document.getElementById('drag-list');
  let dragged = null;
  list.querySelectorAll('.drag-item').forEach(item=>{
    item.addEventListener('dragstart',()=>{dragged=item;setTimeout(()=>item.classList.add('dragging'),0);});
    item.addEventListener('dragend',()=>{item.classList.remove('dragging');list.querySelectorAll('.drag-item').forEach(i=>i.classList.remove('drag-over'));renumber();});
    item.addEventListener('dragover',e=>{e.preventDefault();list.querySelectorAll('.drag-item').forEach(i=>i.classList.remove('drag-over'));if(item!==dragged)item.classList.add('drag-over');});
    item.addEventListener('drop',e=>{e.preventDefault();if(item!==dragged){const all=[...list.querySelectorAll('.drag-item')];list.insertBefore(dragged,all.indexOf(dragged)<all.indexOf(item)?item.nextSibling:item);}renumber();});
  });
}

function renumber(){document.querySelectorAll('#drag-list .drag-item').forEach((el,i)=>el.querySelector('.drag-num').textContent=i+1);}

function checkOrder(qIdx) {
  const q = QUESTIONS[qIdx];
  totalAnswered++;
  const seqs=[...document.querySelectorAll('#drag-list .drag-item')].map(el=>el.dataset.seq);
  const starredActual=seqs.filter(s=>s!=='free'&&s!=='null').map(Number);
  const starredExpected=q.items.filter(i=>i.seq!==null).sort((a,b)=>a.seq-b.seq).map(i=>i.seq);
  const ok=JSON.stringify(starredActual)===JSON.stringify(starredExpected);
  document.querySelectorAll('#drag-list .drag-item').forEach(el=>el.classList.add(ok?'correct-item':'wrong-item'));
  document.getElementById('check-order-btn').disabled=true;
  if(ok){feedback(true,'✓ Správné pořadí!',q.why);totalCorrect++;}
  else{feedback(false,'✗ Pořadí není správné.',q.why+' Otázka se zopakuje.');retryQueue.push(qIdx);}
  updateProgress();
  showNext();
}

// ── FLAG MATCH ──────────────────────────────────────────────────────────────────
function buildFlagMatch(q) {
  let pool = `<div class="pool-col"><div class="col-label">Vlajky</div><div class="flags-pool" id="flags-pool">`;
  q.flags.forEach(f=>{
    pool += `<div class="flag-chip" draggable="true" id="${f.id}" data-flag="${f.id}">${pennantSVG(f.svg,44)}</div>`;
  });
  pool += `</div></div>`;
  let targets = `<div class="targets-col"><div class="col-label">Kategorie</div>`;
  q.targets.forEach(t=>{
    targets += `<div class="target-row">
      <div class="target-drop" id="${t.id}" data-target="${t.id}"></div>
      <span class="target-label">${t.label}</span>
    </div>`;
  });
  targets += `</div>`;
  return `<div class="flag-dnd-wrap">${pool}${targets}</div>
    <button class="action-btn" id="check-flags-btn" onclick="checkFlags(${QUESTIONS.indexOf(q)})">Zkontrolovat přiřazení</button>`;
}

function initFlagMatch(q) {
  let dragged = null;
  document.querySelectorAll('.flag-chip').forEach(chip=>{
    chip.addEventListener('dragstart',()=>dragged=chip);
    chip.addEventListener('dragend',()=>dragged=null);
  });
  const dropZones=[...document.querySelectorAll('.target-drop'),document.getElementById('flags-pool')];
  dropZones.forEach(zone=>{
    zone.addEventListener('dragover',e=>{e.preventDefault();if(zone.classList.contains('target-drop'))zone.classList.add('drag-over-target');});
    zone.addEventListener('dragleave',()=>zone.classList.remove('drag-over-target'));
    zone.addEventListener('drop',e=>{
      e.preventDefault();zone.classList.remove('drag-over-target');
      if(!dragged)return;
      if(zone.classList.contains('target-drop')&&zone.querySelector('.flag-chip'))
        document.getElementById('flags-pool').appendChild(zone.querySelector('.flag-chip'));
      zone.appendChild(dragged);
    });
  });
}

function checkFlags(qIdx) {
  const q=QUESTIONS[qIdx];
  totalAnswered++;
  let ok=true;
  q.targets.forEach(t=>{
    const el=document.getElementById(t.id);
    const chip=el.querySelector('.flag-chip');
    if(!chip||chip.dataset.flag!==t.correct){el.classList.add('wrong-drop');ok=false;}
    else el.classList.add('correct-drop');
  });
  document.getElementById('check-flags-btn').disabled=true;
  if(ok){feedback(true,'✓ Správně přiřazeno!',q.why);totalCorrect++;}
  else{feedback(false,'✗ Něco není správně.',q.why);retryQueue.push(qIdx);}
  updateProgress();
  showNext();
}

      ${[['f3','3 (trikolóra – modro-bílo-červená)'],['fP','P (modrá – bílý rámeček)'],['fN','N (šachovnice modro-bílá)']].map(([f,label])=>`
        <div class="flag-row-ctrl">
          <div class="flag-row-label">Vlajka ${label}</div>
          <div class="flag-btns">
            <button class="mast-btn" onclick="moveMast('${q.id}','${f}','up')">▲ Vytáhnout</button>
            <button class="mast-btn" onclick="moveMast('${q.id}','${f}','down')">▼ Spustit</button>
            <span class="flag-pos-badge" id="badge-${f}-${q.id}">DOLE</span>
          </div>
        </div>`).join('')}
      <button class="action-btn" onclick="checkMast('${q.id}',${QUESTIONS.findIndex(qq=>qq.id===q.id)})">Potvrdit nastavení</button>
    </div>
  </div>`;
}

// Base Y of each flag group in SVG (the polygon start Y)
const MAST_DOWN = { f3: 0,   fP: 0,   fN: 0   };
const MAST_UP   = { f3:-130, fP:-180, fN:-230 };

function moveMast(qId, flag, dir) {
  mastState[qId][flag] = dir;
  const el = document.getElementById(`m${flag}-${qId}`);
  const dy = dir==='up' ? MAST_UP[flag] : MAST_DOWN[flag];
  el.style.transform = `translateY(${dy}px)`;
  const badge = document.getElementById(`badge-${flag}-${qId}`);
  badge.textContent = dir==='up' ? 'NAHOŘE' : 'DOLE';
  badge.className = `flag-pos-badge${dir==='up'?' up':''}`;
}

function checkMast(qId, qIdx) {
  const q=QUESTIONS[qIdx];
  totalAnswered++;
  const s=mastState[qId];
  const ok=s.f3===q.correct.f3&&s.fP===q.correct.fP&&s.fN===q.correct.fN;
  if(ok){feedback(true,'✓ Správně!',q.why);totalCorrect++;}
  else{
    const d=`Správně: vlajka 3 – ${q.correct.f3==='up'?'NAHOŘE':'DOLE'}, P – ${q.correct.fP==='up'?'NAHOŘE':'DOLE'}, N – ${q.correct.fN==='up'?'NAHOŘE':'DOLE'}. ${q.why}`;
    feedback(false,'✗ Chyba!',d);
    retryQueue.push(qIdx);
  }
  updateProgress();
  showNext();
}

// ── HELPERS ─────────────────────────────────────────────────────────────────────
function feedback(ok,title,text){
  const fb=document.getElementById('fb');
  fb.className=`feedback-box show ${ok?'correct-fb':'wrong-fb'}`;
  fb.innerHTML=`<strong>${title}</strong>${text}`;
}
function showNext(){document.getElementById('next-btn').classList.add('show');}
function advance(){
  if(mainQueue.length>0) renderQuestion(mainQueue.shift(),false);
  else if(retryQueue.length>0) renderQuestion(retryQueue.shift(),true);
  else showResults();
}
function updateProgress(){
  const pct=Math.round((totalCorrect/TOTAL)*100);
  document.getElementById('prog-label').textContent=`${totalCorrect} / ${TOTAL} správně`;
  document.getElementById('prog-pct').textContent=`${pct} %`;
  document.getElementById('prog-fill').style.width=pct+'%';
}
function showResults(){
  document.getElementById('quiz-container').innerHTML='';
  document.getElementById('progress-wrap').style.display='none';
  const card=document.getElementById('results-card');
  card.classList.add('show');
  document.getElementById('res-score').textContent=`${totalCorrect} / ${TOTAL}`;
  const pct=Math.round((totalCorrect/TOTAL)*100);
  const msgs=[[100,'🏆 Perfektní! Jsi plně připraven/a na SkaRe!'],[80,'⚓ Výborně! Ještě trochu a bude to perfektní.'],[60,'🌊 Dobrý základ – ještě trochu přidat!'],[0,'⛵ Nevadí, trénink dělá mistry. Zkus to znovu!']];
  document.getElementById('res-detail').textContent=msgs.find(([t])=>pct>=t)[1];
}
function restartQuiz(){
  mainQueue=QUESTIONS.map((_,i)=>i);retryQueue=[];totalCorrect=0;totalAnswered=0;
  document.getElementById('results-card').classList.remove('show');
  document.getElementById('progress-wrap').style.display='';
  renderQuestion(mainQueue.shift(),false);
}

renderQuestion(mainQueue.shift(),false);

</script>
